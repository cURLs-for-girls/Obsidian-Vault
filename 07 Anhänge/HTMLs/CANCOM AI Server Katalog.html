<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANCOM AI Server Katalog</title>
  <style>
    :root {
      --red:       #DA002C;
      --red-hot:   #FF0034;
      --berry:     #8A1538;
      --dark:      #0D0714;
      --dark-mid:  #1A0E2A;
      --dark-card: #150B22;
      --surface:   #1E1230;
      --border:    #2E1D45;
      --border-lt: #3D2858;
      --text:      #F3F0FA;
      --muted:     #A89EC0;
      --dim:       #6B5F85;
      --dell-blue:  #0076CE;
      --hpe-green:  #00853E;
      --cisco-blue: #049FD9;
      --nv-green:  #76B900;
      --xs: #7B5EA7; --s: #AC1361; --m: #DA002C;
      --l:  #C45200; --xl: #8A1538; --xxl: #4A1660;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0D0714 0%, #1A0E2A 45%, #2D0A1E 100%);
      padding: 22px 40px 18px; border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; top: -50px; right: -40px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(218,0,44,.2) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo { font-size: 11px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--red-hot); margin-bottom: 5px; }
    .header-title { font-size: 21px; font-weight: 700; color: #fff; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Manufacturer Switch ── */
    .mfr-bar {
      background: var(--dark-mid); border-bottom: 1px solid var(--border);
      padding: 12px 40px; display: flex; align-items: center; gap: 10px;
    }
    .mfr-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-right: 4px; }
    .mfr-btn {
      display: flex; align-items: center;
      padding: 6px 8px; border-radius: 6px; border: none;
      cursor: pointer; transition: opacity .2s, filter .2s;
      background: transparent;
    }
    .mfr-btn img.mfr-logo {
      height: 32px; width: auto; object-fit: contain;
      filter: grayscale(1) brightness(1.8); opacity: .4;
      transition: filter .2s, opacity .2s;
    }
    .mfr-btn:hover img.mfr-logo { opacity: .65; }
    .mfr-btn.active-dell  img.mfr-logo,
    .mfr-btn.active-hpe   img.mfr-logo,
    .mfr-btn.active-cisco img.mfr-logo { filter: none; opacity: 1; }
    .mfr-btn.active-dell { }
    .mfr-btn.active-hpe   { }
    .mfr-btn.active-cisco { }

    /* ── NVIDIA GPU Table Toggle ── */
    .gpu-toggle-row {
      background: #0A0510; border-bottom: 1px solid var(--border);
      padding: 7px 40px; display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .gpu-toggle-row:hover { background: #100820; }
    .toggle-label { font-size: 11.5px; font-weight: 600; color: var(--muted); }
    .toggle-arrow { font-size: 9px; color: var(--dim); transition: transform .25s; }
    .toggle-arrow.open { transform: rotate(180deg); }
    .nv-badge { margin-left: auto; background: rgba(118,185,0,.12); border: 1px solid rgba(118,185,0,.3); color: #A8D870; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

    /* ── NVIDIA GPU Matrix ── */
    .gpu-matrix-wrap {
      background: #090412; border-bottom: 1px solid var(--border);
      overflow: hidden; max-height: 0; transition: max-height .35s ease;
    }
    .gpu-matrix-wrap.open { max-height: 1000px; }
    .gpu-matrix-inner { padding: 16px 40px 20px; overflow-x: auto; }

    /* ── NVIDIA table ── */
    .nv-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 860px; }
    .nv-table td { border: 1px solid #252030; padding: 0; vertical-align: top; }

    .nv-axis {
      background: #0E0A18; font-weight: 800; font-size: 10px; text-transform: uppercase;
      letter-spacing: .07em; writing-mode: vertical-rl; transform: rotate(180deg);
      text-align: center; width: 26px; padding: 10px 3px;
    }
    .nv-axis.compute  { color: #90C0FF; }
    .nv-axis.graphics { color: #A8D870; }

    .nv-axis-right {
      background: #0E0A18; font-weight: 800; font-size: 10px; text-transform: uppercase;
      letter-spacing: .07em; writing-mode: vertical-rl; text-align: center; width: 26px; padding: 10px 3px;
    }
    .nv-axis-right.compute  { color: #90C0FF; }
    .nv-axis-right.graphics { color: #A8D870; }

    .nv-gen-hd {
      background: var(--nv-green); color: #000; font-weight: 800;
      font-size: 12px; text-align: center; padding: 5px 8px;
      border-bottom: 1px solid #333;
    }
    .nv-cell {
      background: #121020; color: #C8C0E0; padding: 7px 9px;
      font-size: 11px; line-height: 1.55;
    }
    .nv-cell li { list-style: none; }
    .nv-cell li::before { content: "▪ "; color: var(--nv-green); font-size: 9px; }
    .nv-focus { background: #171510; outline: 2px solid rgba(118,185,0,.35); outline-offset: -1px; }
    .nv-hl-h  { color: #7CC8FF; font-weight: 700; }
    .nv-hl-b  { color: #A8D870; font-weight: 700; }

    .nv-divrow td { background: var(--nv-green); height: 3px; padding: 0; border: none; }
    /* Divider row between compute and graphics */
    .nv-divider td { background: var(--nv-green); height: 3px; padding: 0; border: none; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: var(--dark-mid); border-bottom: 1px solid var(--border);
      padding: 9px 40px; display: flex; align-items: center; gap: 7px;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
    }
    .filter-label { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-right: 2px; }
    .chip {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border-lt); cursor: pointer; background: transparent; color: var(--muted); transition: all .15s;
    }
    .chip:hover { border-color: var(--red); color: var(--text); }
    .chip.active { color: #fff; border-color: transparent; }
    .chip[data-tier="all"].active { background: linear-gradient(90deg,var(--berry),var(--red)); }
    .chip[data-tier="s"].active   { background: var(--s); }
    .chip[data-tier="m"].active   { background: var(--m); }
    .chip[data-tier="l"].active   { background: var(--l); }
    .chip[data-tier="xl"].active  { background: var(--xl); }
    .search-box {
      margin-left: auto; background: var(--surface); border: 1.5px solid var(--border-lt);
      border-radius: 7px; padding: 5px 12px; font-size: 12.5px; color: var(--text);
      outline: none; width: 200px; transition: border .15s;
    }
    .search-box::placeholder { color: var(--dim); }
    .search-box:focus { border-color: var(--red); }
    .gpu-search-banner {
      grid-column: 1/-1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: rgba(118,185,0,.08); border: 1px solid rgba(118,185,0,.25);
      border-radius: 8px; padding: 10px 16px; margin-bottom: 4px; font-size: 12.5px;
    }
    .gpu-search-banner .gsb-gpu  { color: #A8D870; font-weight: 700; }
    .gpu-search-banner .gsb-slot { background: rgba(118,185,0,.15); border: 1px solid rgba(118,185,0,.3); border-radius: 4px; padding: 2px 8px; color: #A8D870; font-size: 11px; font-weight: 700; }
    .gpu-search-banner .gsb-count { margin-left: auto; color: var(--muted); }
    .gpu-search-banner .gsb-hint  { color: var(--dim); font-size: 11px; }

    /* ── Grid ── */
    main { padding: 22px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }

    /* ── Card ── */
    .card {
      background: var(--dark-card); border-radius: 10px; border: 1px solid var(--border);
      overflow: hidden; display: flex; flex-direction: column;
      transition: box-shadow .22s ease, border-color .22s ease, transform .22s ease;
    }
    .card { cursor: default; }
    .card:hover {
      border-color: rgba(218,0,44,.55);
      box-shadow: 0 12px 36px rgba(218,0,44,.22), 0 4px 12px rgba(0,0,0,.5);
      transform: translateY(-5px) scale(1.012);
    }
    .card[data-mfr="hpe"]:hover {
      border-color: rgba(0,133,62,.55);
      box-shadow: 0 12px 36px rgba(0,133,62,.22), 0 4px 12px rgba(0,0,0,.5);
    }
    .card[data-mfr="cisco"]:hover {
      border-color: rgba(4,159,217,.55);
      box-shadow: 0 12px 36px rgba(4,159,217,.22), 0 4px 12px rgba(0,0,0,.5);
    }
    .card:hover .card-accent { transform: scaleX(1.0); height: 4px; }
    .card:hover .card-name   { color: #fff; letter-spacing: .01em; }
    .card-accent { height: 3px; transition: height .22s ease; }
    .card-header { padding: 13px 15px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-name { font-size: 14px; font-weight: 700; color: #fff; }
    .tier-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9px; color: #fff; white-space: nowrap; flex-shrink: 0; }
    .tier-s { background: var(--s); } .tier-m { background: var(--m); }
    .tier-l { background: var(--l); } .tier-xl { background: var(--xl); }
    .card-body { padding: 11px 15px; flex: 1; display: flex; flex-direction: column; gap: 9px; }
    .use-case { font-size: 11.5px; color: var(--muted); line-height: 1.55; }
    .meta-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .meta-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 11px; color: var(--muted); }
    .meta-pill strong { color: var(--dim); font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 1px; }
    .gpu-section { display: flex; flex-direction: column; gap: 4px; }
    .gpu-sec-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--dim); }
    .gpu-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .gpu-pill { font-size: 10.5px; font-weight: 600; border-radius: 4px; padding: 2px 7px; }
    .gpu-pill.sw  { background: rgba(172,19,97,.12);  color: #E878B8; border: 1px solid rgba(172,19,97,.25); }
    .gpu-pill.dw  { background: rgba(0,118,206,.12);  color: #7CC8FF; border: 1px solid rgba(0,118,206,.25); }
    .gpu-pill.hgx { background: rgba(118,185,0,.12);  color: #A8D870; border: 1px solid rgba(118,185,0,.25); }
    .gpu-pill.int { background: rgba(140,100,220,.12); color: #C0A8FF; border: 1px solid rgba(140,100,220,.25); }
    .card-footer { padding: 9px 15px; border-top: 1px solid var(--border); }
    .btn-spec { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; transition: all .15s; background: linear-gradient(135deg,#0076CE,#004F99); color: #fff; border: none; cursor: pointer; }
    .btn-spec:hover { background: linear-gradient(135deg,#2291E0,#0076CE); }
    .btn-spec.hpe-btn   { background: linear-gradient(135deg,#00853E,#005C2B); }
    .btn-spec.cisco-btn { background: linear-gradient(135deg,#049FD9,#00709B); }
    .btn-spec.hpe-btn:hover   { background: linear-gradient(135deg,#00A34A,#00853E); }
    .btn-spec.cisco-btn:hover { background: linear-gradient(135deg,#28B8F0,#049FD9); }
    .btn-spec.disabled { background: var(--surface); color: var(--dim); cursor: not-allowed; border: 1px solid var(--border); }
    .icon { width: 13px; height: 13px; flex-shrink: 0; }
    .no-results { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--dim); font-size: 14px; }

    @media (max-width:700px) {
      header,.mfr-bar,.filter-bar,main,.gpu-toggle-row,.gpu-matrix-inner { padding-left:16px; padding-right:16px; }
      main { grid-template-columns: 1fr; }
      .search-box { width:100%; margin-left:0; }
    }
  </style>
</head>

// Multi-select manufacturer state – alle drei standardmäßig aktiv
const activeMfrs = new Set(['dell', 'hpe', 'cisco']);

function toggleMfr(mfr) {
  if (activeMfrs.has(mfr)) {
    // Nicht deaktivieren wenn es der letzte ist
    if (activeMfrs.size === 1) return;
    activeMfrs.delete(mfr);
  } else {
    activeMfrs.add(mfr);
  }
  const classes = { dell: 'active-dell', hpe: 'active-hpe', cisco: 'active-cisco' };
  ['dell','hpe','cisco'].forEach(m => {
    const el = document.getElementById('btn-' + m);
    el.className = 'mfr-btn' + (activeMfrs.has(m) ? ' ' + classes[m] : '');
  });
  render();
}

function toggleGpu() {
  const wrap = document.getElementById('gpu-matrix-wrap');
  const arr  = document.getElementById('tog-arrow');
  wrap.classList.toggle('open');
  arr.classList.toggle('open');
}

function renderCard(s, mfr) {
  const pills = s.gpu.map(g => `<span class="gpu-pill ${gpuClass(g)}">${g}</span>`).join('');
  const btnExtra = mfr==='hpe' ? ' hpe-btn' : mfr==='cisco' ? ' cisco-btn' : '';
  const btn = s.specSheet
    ? `<a class="btn-spec${btnExtra}" href="${s.specSheet}" target="_blank">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Spec Sheet öffnen
      </a>`
    : `<span class="btn-spec disabled">Spec Sheet folgt</span>`;
  return `
  <div class="card" data-mfr="${mfr}" data-tier="${s.tier}" data-search="${s.name.toLowerCase()} ${s.sockel.toLowerCase()} ${s.gpu.join(' ').toLowerCase()}">
    <div class="card-accent" style="background:${TIER_COLORS[s.tier]}"></div>
    <div class="card-header">
      <div class="card-name">${s.name}</div>
      <span class="tier-badge tier-${s.tier}">${TIER_LABELS[s.tier]}</span>
    </div>
    <div class="card-body">
      <div class="use-case">${s.useCase}</div>
      <div class="meta-row">
        <div class="meta-pill"><strong>Form Factor</strong>${s.formFactor}</div>
        <div class="meta-pill"><strong>Sockel</strong>${s.sockel}</div>
      </div>
      <div class="gpu-section">
        <div class="gpu-sec-label">Unterstützte GPUs</div>
        <div class="gpu-pills">${pills}</div>
      </div>
    </div>
    <div class="card-footer">${btn}</div>
  </div>`;
}

// ── GPU → Slot-Typ Mapping ────────────────────────────────────────────────────
// slot: sw = Single-Wide PCIe | dw = Double-Wide PCIe | hgx = NVLink/SXM | int = Integriert
const GPU_MAP = [
  // Single-Wide (SW)
  { name:"NVIDIA A10",                 slot:"sw", aliases:["a10"] },
  { name:"NVIDIA A30",                 slot:"sw", aliases:["a30"] },
  { name:"NVIDIA L4",                  slot:"sw", aliases:["l4"] },
  { name:"NVIDIA L40S",                slot:"sw", aliases:["l40s"] },
  { name:"NVIDIA RTX 4000 Ada",        slot:"sw", aliases:["rtx 4000","rtx4000"] },
  // Double-Wide (DW)
  { name:"NVIDIA A100 PCIe",           slot:"dw", aliases:["a100 pcie","a100"] },
  { name:"NVIDIA H100 PCIe",           slot:"dw", aliases:["h100 pcie"] },
  { name:"NVIDIA H200 PCIe",           slot:"dw", aliases:["h200 pcie"] },
  { name:"NVIDIA B200 PCIe",           slot:"dw", aliases:["b200 pcie"] },
  { name:"NVIDIA L40",                 slot:"dw", aliases:["l40"] },
  { name:"NVIDIA RTX 4500 Ada",        slot:"dw", aliases:["rtx 4500","rtx4500"] },
  { name:"NVIDIA RTX 5000 Ada",        slot:"dw", aliases:["rtx 5000","rtx5000"] },
  { name:"NVIDIA RTX 5880",            slot:"dw", aliases:["rtx 5880","rtx5880"] },
  { name:"NVIDIA RTX 6000 Ada",        slot:"dw", aliases:["rtx 6000 ada"] },
  { name:"NVIDIA RTX 6000 Blackwell",  slot:"dw", aliases:["rtx 6000 blackwell","rtx6000 blackwell"] },
  { name:"NVIDIA RTX 6000",            slot:"dw", aliases:["rtx 6000","rtx6000"] },
  // HGX / NVLink SXM (nur in HGX-Servern)
  { name:"NVIDIA H100 SXM",            slot:"hgx", aliases:["h100 sxm","h100 hgx","h100"] },
  { name:"NVIDIA H200 SXM",            slot:"hgx", aliases:["h200 sxm","h200 hgx","h200"] },
  { name:"NVIDIA B100",                slot:"hgx", aliases:["b100"] },
  { name:"NVIDIA B200 SXM",            slot:"hgx", aliases:["b200 sxm","b200 hgx","b200"] },
  { name:"NVIDIA B300",                slot:"hgx", aliases:["b300"] },
  { name:"NVIDIA GB200 NVL",           slot:"hgx", aliases:["gb200"] },
  // Integriert
  { name:"NVIDIA GH200 Grace Hopper",  slot:"int", aliases:["gh200","grace hopper"] }
];

const SLOT_LABELS = {
  sw:"Single-Wide PCIe", dw:"Double-Wide PCIe",
  hgx:"HGX / NVLink SXM", int:"Integriert (GH200)"
};

// Einfacher Alias-Match: sucht " term " in " alias " (Wortgrenze durch Leerzeichen)
function aliasMatch(query, alias) {
  return (' ' + alias + ' ').indexOf(' ' + query + ' ') !== -1;
}

function findGpuMatch(q) {
  if (!q || q.length < 2) return null;
  // Längere Aliases zuerst (spezifischere Treffer haben Vorrang)
  var entries = GPU_MAP.slice().sort(function(a, b) {
    var maxA = 0, maxB = 0;
    for (var i = 0; i < a.aliases.length; i++) if (a.aliases[i].length > maxA) maxA = a.aliases[i].length;
    for (var i = 0; i < b.aliases.length; i++) if (b.aliases[i].length > maxB) maxB = b.aliases[i].length;
    return maxB - maxA;
  });
  for (var i = 0; i < entries.length; i++) {
    var g = entries[i];
    // Name-Check (ganzes Wort im GPU-Namen)
    if (aliasMatch(q, g.name.toLowerCase())) return g;
    // Alias-Check
    for (var j = 0; j < g.aliases.length; j++) {
      if (aliasMatch(q, g.aliases[j]) || aliasMatch(g.aliases[j], q)) return g;
    }
  }
  return null;
}

function serverSupportsSlot(server, slot) {
  var s = server.gpu.join(' ').toLowerCase();
  if (slot === 'sw')  return s.indexOf('sw') !== -1 || s.indexOf('single') !== -1 || s.indexOf('dw') !== -1 || s.indexOf('double') !== -1;
  if (slot === 'dw')  return s.indexOf('dw') !== -1 || s.indexOf('double') !== -1;
  if (slot === 'hgx') return s.indexOf('hgx') !== -1 || s.indexOf('sxm') !== -1 || s.indexOf('nvlink') !== -1;
  if (slot === 'int') return s.indexOf('gh200') !== -1 || s.indexOf('integriert') !== -1;
  return false;
}

function render() {
  try {
    var chipEl  = document.querySelector('.chip.active');
    var tier    = chipEl ? chipEl.dataset.tier : 'all';
    var searchEl = document.getElementById('search');
    var q       = searchEl ? searchEl.value.toLowerCase().trim() : '';

    var pool = [];
    if (activeMfrs.has('dell'))  { for (var i=0;i<DELL.length;i++)  { var s=Object.assign({},DELL[i]);  s._mfr='dell';  pool.push(s); } }
    if (activeMfrs.has('hpe'))   { for (var i=0;i<HPE.length;i++)   { var s=Object.assign({},HPE[i]);   s._mfr='hpe';   pool.push(s); } }
    if (activeMfrs.has('cisco')) { for (var i=0;i<CISCO.length;i++) { var s=Object.assign({},CISCO[i]); s._mfr='cisco'; pool.push(s); } }

    var gpuMatch = findGpuMatch(q);

    var filtered = [];
    for (var i = 0; i < pool.length; i++) {
      var s = pool[i];
      if (tier !== 'all' && s.tier !== tier) continue;
      if (!q) { filtered.push(s); continue; }
      if (gpuMatch) {
        if (serverSupportsSlot(s, gpuMatch.slot)) filtered.push(s);
        continue;
      }
      // Name-Suche
      var n = s.name.toLowerCase();
      var m = s._mfr.toLowerCase();
      var k = s.sockel.toLowerCase();
      var f = s.formFactor.toLowerCase();
      var u = s.useCase.toLowerCase();
      var gpuStr = s.gpu.join(' ').toLowerCase();
      if (n.indexOf(q) !== -1 || m.indexOf(q) !== -1 || k.indexOf(q) !== -1 ||
          f.indexOf(q) !== -1 || u.indexOf(q) !== -1 || gpuStr.indexOf(q) !== -1) {
        filtered.push(s);
      }
    }

    // GPU-Suche Banner
    var banner = '';
    if (gpuMatch && q) {
      banner = '<div class="gpu-search-banner">'
             + '<span>&#127919; GPU-Suche:</span>'
             + '<span class="gsb-gpu">' + gpuMatch.name + '</span>'
             + '<span class="gsb-slot">' + SLOT_LABELS[gpuMatch.slot] + '</span>'
             + '<span class="gsb-hint">&mdash; Server mit kompatiblem Slot</span>'
             + '<span class="gsb-count">' + filtered.length + ' Server gefunden</span>'
             + '</div>';
    }

    var grid = document.getElementById('grid');
    if (filtered.length > 0) {
      var html = banner;
      for (var i = 0; i < filtered.length; i++) html += renderCard(filtered[i], filtered[i]._mfr);
      grid.innerHTML = html;
    } else {
      grid.innerHTML = banner + '<div class="no-results">Keine Server gefunden.</div>';
    }
  } catch(e) {
    console.error('render error:', e);
  }
}

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); render();
}));
document.getElementById('search').addEventListener('input', render);
render();
</script>
